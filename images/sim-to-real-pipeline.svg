<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="simGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="exportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2"/>
      <stop offset="100%" style="stop-color:#6A1B9A"/>
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#546E7A"/>
    </marker>
  </defs>

  <rect width="900" height="280" fill="#FAFBFC" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#232F3E">Sim-to-Real Pipeline</text>

  <!-- Step 1: Simulation -->
  <rect x="40" y="55" width="230" height="180" rx="12" fill="url(#simGrad)" filter="url(#shadow)"/>
  <text x="155" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Simulation</text>
  <line x1="70" y1="95" x2="240" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="155" y="120" text-anchor="middle" font-size="12" fill="#BBDEFB">4,096 parallel envs</text>
  <text x="155" y="142" text-anchor="middle" font-size="12" fill="#BBDEFB">GPU accelerated</text>
  <text x="155" y="164" text-anchor="middle" font-size="12" fill="#BBDEFB">75 min training</text>
  <text x="155" y="192" text-anchor="middle" font-size="11" fill="#90CAF9">147M timesteps</text>
  <rect x="55" y="205" width="200" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="155" y="220" text-anchor="middle" font-size="10" fill="#E3F2FD">Isaac Sim + Isaac Lab + PPO</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="145" x2="330" y2="145" stroke="#546E7A" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="300" y="135" text-anchor="middle" font-size="10" fill="#546E7A" font-weight="600">train</text>

  <!-- Step 2: Policy Export -->
  <rect x="335" y="55" width="230" height="180" rx="12" fill="url(#exportGrad)" filter="url(#shadow)"/>
  <text x="450" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Policy Export</text>
  <line x1="365" y1="95" x2="535" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <rect x="365" y="110" width="170" height="35" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="450" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="white">policy_jit.pt</text>
  <text x="450" y="140" text-anchor="middle" font-size="9" fill="#CE93D8">TorchScript JIT (1.2 MB)</text>

  <rect x="365" y="155" width="170" height="35" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="450" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="white">policy.onnx</text>
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="#CE93D8">ONNX (1.1 MB)</text>

  <rect x="365" y="200" width="170" height="27" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="450" y="218" text-anchor="middle" font-size="10" fill="#E1BEE7">C++ / TensorRT / Jetson</text>

  <!-- Arrow 2 -->
  <line x1="565" y1="145" x2="625" y2="145" stroke="#546E7A" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="595" y="135" text-anchor="middle" font-size="10" fill="#546E7A" font-weight="600">deploy</text>

  <!-- Step 3: Real Robot -->
  <rect x="630" y="55" width="230" height="180" rx="12" fill="url(#robotGrad)" filter="url(#shadow)"/>
  <text x="745" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="white">Real Robot</text>
  <line x1="660" y1="95" x2="830" y2="95" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="745" y="120" text-anchor="middle" font-size="12" fill="#FFCCBC">ANYmal-C Quadruped</text>
  <text x="745" y="142" text-anchor="middle" font-size="12" fill="#FFCCBC">12 joints control</text>
  <text x="745" y="164" text-anchor="middle" font-size="12" fill="#FFCCBC">Real-time inference</text>
  <text x="745" y="192" text-anchor="middle" font-size="11" fill="#FFE0B2">Rough terrain walking</text>
  <rect x="660" y="205" width="170" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="745" y="220" text-anchor="middle" font-size="10" fill="#FFF3E0">Sim-to-Real Transfer</text>

  <!-- Bottom labels -->
  <text x="155" y="260" text-anchor="middle" font-size="10" fill="#78909C">STEP 1</text>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#78909C">STEP 2</text>
  <text x="745" y="260" text-anchor="middle" font-size="10" fill="#78909C">STEP 3</text>

  <!-- Cost badge -->
  <rect x="370" y="248" width="160" height="24" rx="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="450" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#2E7D32">Total: ~$12 / 75 min</text>
</svg>
